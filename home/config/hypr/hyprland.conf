# Launch Brave (engine starts, window stays hidden in the special workspace)
exec-once = [workspace 1 silent] brave-browser --no-startup-window

################
### MONITORS ###
################
monitor=,1920x1080@180,auto,1

###################
### MY PROGRAMS ###
###################
$terminal = kitty
$fileManager = nautilus
env = TERMINAL, kitty

#################
### AUTOSTART ###
#################
exec-once = gnome-keyring-daemon --start --components=secrets,pkcs11,ssh
exec-once = dbus-update-activation-environment --systemd --all
exec-once = systemctl --user import-environment PATH
# Focus workspace 1 on boot
exec-once = hyprctl dispatch workspace 1
exec-once = snappy-wrapper toggle

#############################
### ENVIRONMENT VARIABLES ###
#############################

# Toolkit Backend
env = GDK_BACKEND,wayland,x11,*
env = QT_QPA_PLATFORM,wayland;xcb
env = SDL_VIDEODRIVER,wayland
env = CLUTTER_BACKEND,wayland

#####################
### LOOK AND FEEL ###
#####################
general {
    gaps_in = 2
    gaps_out = 0
    border_size = 0
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)

    resize_on_border = true
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 10
    # rounding_power is deprecated in newer versions, using modern syntax:

    active_opacity = 0.945
    inactive_opacity = 0.94

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    blur {
        enabled = true
        size = 6
        passes = 3
        # Modern glassmorphism tweaks
        contrast = 0.9
        brightness = 0.8
        noise = 0.01
        vibrancy = 2.0
        vibrancy_darkness = 0.2

        ignore_opacity = true
        new_optimizations = true
        popups = true
        xray = false
    }
}

##################
### ANIMATIONS ###
##################
animations {
    enabled = yes

    # -----------------------------------------------------
    # macOS-style Beziers (Snappier Physics)
    # -----------------------------------------------------
    bezier = apple_default, 0.42, 0, 0.58, 1
    bezier = apple_pop, 0.25, 1, 0.5, 1
    bezier = apple_slide, 0.3, 1, 0.5, 1  # Sharper deceleration

    # -----------------------------------------------------
    # High-Speed Rules (Optimized for 180Hz)
    # -----------------------------------------------------
    # Lowering the numbers (e.g., from 6 to 3) makes them faster.

    animation = global, 1, 3.5, apple_default

    # Windows: Pop in instantly but with a soft finish
    animation = windows, 1, 3, apple_pop, popin 80%
    animation = windowsIn, 1, 3, apple_pop, popin 80%
    animation = windowsOut, 1, 2.5, apple_pop, popin 85%

    # Fades: Near-instant
    animation = fadeIn, 1, 2, apple_default
    animation = fadeOut, 1, 2, apple_default
    animation = fade, 1, 3, apple_default

    # Workspaces: Fast horizontal "Zip"
    # Using 3.5 speed at 180Hz feels like a quick flick of a finger
    animation = workspaces, 1, 3.5, apple_slide, slide
    animation = workspacesIn, 1, 3.5, apple_slide, slide
    animation = workspacesOut, 1, 3.5, apple_slide, slide

    # Special Workspace (Scratchpad)
    animation = specialWorkspace, 1, 3.5, apple_slide, slidevert

    # Layers (Bars/Docks): Quick appearing
    animation = layers, 1, 2.5, apple_default, fade
}

############
### MISC ###
############
misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    vfr = false
    vrr = true
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
    animate_manual_resizes = false
}

xwayland {
    force_zero_scaling = true
}

#############
### INPUT ###
#############
input {
    kb_layout = us,it
    kb_options = grp:win_space_toggle

    follow_mouse = 1
    mouse_refocus = false # Improves focus handling
    sensitivity = 0.1

    touchpad {
        natural_scroll = false
    }
}

device {
    name = epic-mouse-v1
    sensitivity = -0.5
}

####################
### WINDOW RULES ###
####################
# Smart Gaps (No gaps when one window or fullscreen)
workspace = f[1], gapsout:0, gapsin:0
workspace = w[tv1], gapsout:0, gapsin:0
windowrulev2 = bordersize 0, floating:0, onworkspace:f[1]
windowrulev2 = rounding 0, floating:0, onworkspace:f[1]
windowrulev2 = bordersize 0, floating:0, onworkspace:w[tv1]
windowrulev2 = rounding 0, floating:0, onworkspace:w[tv1]

# App Specific Rules
windowrule = float, class:^(org.gnome.Nautilus)$
windowrule = float, class:^(io.github.amit9838.mousam)
windowrule = float, class:^(io.missioncenter.MissionCenter)
windowrulev2 = size 800 600, class:^(io.missioncenter.MissionCenter)$
windowrulev2 = opaque, class:^(brave-browser)$

# Gaming / Video Rules (Performance & No Blur)
windowrulev2 = rounding 0, class:^(Lunar Client.*)$
windowrulev2 = bordersize 0, class:^(Lunar Client.*)$
windowrulev2 = noblur, class:^(Lunar Client.*)$
windowrulev2 = opacity 1.0 override, class:^(Lunar Client.*)$
windowrulev2 = noblur, class:^(org.gnome.Showtime)$
windowrulev2 = opacity 1.0 override, class:^(org.gnome.Showtime)$

windowrulev2 = noblur, workspace:*, inactive:yes

# System Pickers
windowrulev2 = float, class:^(hyprland-preview-share-picker)$
windowrulev2 = center, class:^(hyprland-preview-share-picker)$
windowrulev2 = size 700 450, class:^(hyprland-preview-share-picker)$
windowrulev2 = stayfocused, class:^(hyprland-preview-share-picker)$

# Workspace 1: Brave
windowrulev2 = workspace 1, class:^(brave-browser)$

# Workspace 2: Kitty
windowrulev2 = workspace 2, class:^(kitty)$

# Workspace 3: Nautilus & VS Code
windowrulev2 = workspace 3, class:^(org.gnome.Nautilus)$
windowrulev2 = workspace 3, class:^(code-url-handler)$
windowrulev2 = workspace 3, class:^(code)$

windowrulev2 = workspace special:magic, class:^(vesktop)$
windowrulev2 = workspace special:magic, class:^(discord)$

###################
### LAYER RULES ###
###################
layerrule = blur, ^(dms:dock)$
layerrule = ignorealpha 0.2, ^(dms:dock)$
layerrule = ignorezero, ^(dms:dock)$

layerrule = blur, ^(dms:bar)$
layerrule = ignorealpha 0.2, ^(dms:bar)$
layerrule = ignorezero, ^(dms:bar)$

###################
### KEYBINDINGS ###
###################
$mainMod = SUPER

bind = $mainMod, T, exec, $terminal
bind = $mainMod, C, killactive,
bind = $mainMod, M, exit,
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating,
bind = $mainMod, P, pseudo,
bind = $mainMod, J, togglesplit,
bind = $mainMod, BackSpace, centerwindow # Extra Utility
bind = , PRINT, exec, hyprshot -m region -t 100
bind = ALT, Tab, exec, snappy-switcher next
bind = ALT SHIFT, Tab, exec, snappy-switcher prev

# Dank Material Shell
bindr = SUPER, SUPER_L, exec, dms ipc call spotlight toggle # App Launcher: Toggle
bindr = Super, I, exec, dms ipc call settings open # Settings: Open
bind = Super, L, exec, dms ipc call powermenu toggle # Power Menu: Toggle
bindr = Super, N, exec, dms ipc call audio cycleoutput # Audio Output: Cycle

# Focus & Workspaces
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Scratchpad
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Mouse Binds
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Multimedia
bindel = , XF86AudioRaiseVolume,   exec, dms ipc call audio increment 3
bindel = , XF86AudioLowerVolume,   exec, dms ipc call audio decrement 3
bindl  = , XF86AudioMute,          exec, dms ipc call audio mute
bindel = , XF86MonBrightnessUp,    exec, dms ipc call brightness increment 5
bindel = , XF86MonBrightnessDown,  exec, dms ipc call brightness decrement 5

# Final performance tweak for high refresh screens
dwindle {
    pseudotile = true
    preserve_split = true
}
